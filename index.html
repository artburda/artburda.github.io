<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arthur Burda Fotografie</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #ffffff;
    color: #111111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.cover {
    min-height: 92vh;
    padding: 72px 24px 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
}

h1 {
    margin: 0;
    font-size: 2.8rem;
    font-weight: 300;
    letter-spacing: 0.08em;
}

.subtitle {
    color: #666666;
    margin-top: 16px;
    font-size: 1rem;
}

.intro-image {
    margin-top: 56px;
    width: 100%;
    max-width: 560px;
}

.intro-image img {
    width: 100%;
    height: auto;
    display: block;
}

.portfolio-title {
    max-width: 1400px;
    margin: 0 auto;
    padding: 70px 24px 48px;
    text-align: center;
}

.portfolio-title h2 {
    margin: 0;
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #555555;
}

.portfolio-title::before {
    content: "";
    display: block;
    width: 48px;
    height: 1px;
    background: #cccccc;
    margin: 0 auto 36px;
}

.gallery {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
}

.gallery img {
    display: block;
    height: auto;
    max-width: 1100px;
    max-height: 85vh;
}

footer {
    text-align: center;
    padding: 56px 24px;
    color: #666666;
    font-size: 0.9rem;
    line-height: 1.8;
}

@media (max-width: 700px) {
    .cover {
        min-height: 88vh;
        padding: 56px 16px 40px;
    }

    h1 {
        font-size: 2rem;
    }

    .intro-image {
        margin-top: 40px;
        max-width: 420px;
    }

    .portfolio-title {
        padding: 52px 16px 36px;
    }

    .gallery {
        padding: 0 16px 40px;
        gap: 36px;
    }

    .gallery img {
        max-height: none;
    }
}
</style>

</head>
<body>

<section class="cover">
    <h1>Arthur Burda</h1>
    <p class="subtitle">Fotografie</p>

    <div class="intro-image">
        <img src="images/0.jpg" alt="Titelbild">
    </div>
</section>

<section class="portfolio-title">
    <h2>Portfolio</h2>
</section>

<main class="gallery">
    <img src="images/01 strasse villmergen.jpg" alt="">
    <img src="images/02 Fahrverbot.jpg" alt="">
    <img src="images/03 maschinen.jpg" alt="">
    <img src="images/04 katze.jpg" alt="">
    <img src="images/05 braunwalder.jpg" alt="">
    <img src="images/06 Kreuz.jpg" alt="">
    <img src="images/07 Druckreduzierstation.jpg" alt="">
    <img src="images/08 schafe.jpg" alt="">
    <img src="images/09 Garagen.jpg" alt="">
    <img src="images/10 WGT.jpg" alt="">
    <img src="images/11 wildegg.jpg" alt="">
    <img src="images/12 acker.jpg" alt="">
    <img src="images/13 letzigrund.jpg" alt="">
    <img src="images/14 schnee dottikon.jpg" alt="">
    <img src="images/15 fabrik.jpg" alt="">
    <img src="images/16 velomensch.jpg" alt="">
    <img src="images/17 cos.jpg" alt="">
    <img src="images/18 Tafelberg.jpg" alt="">
</main>

<footer>
    artburda@hotmail.com<br>
    © 2026 Arthur Burda
</footer>

</body>
</html>
```
