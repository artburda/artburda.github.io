<script>
const gallery = document.getElementById("gallery");
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

let currentIndex = 0;

function getColumnCount() {
    if (window.innerWidth <= 700) return 2;
    if (window.innerWidth <= 1000) return 3;
    return 4;
}

function getGap() {
    if (window.innerWidth <= 700) return 8;
    return 14;
}

function layoutMasonry() {
    const columnCount = getColumnCount();
    const gap = getGap();
    const galleryWidth = gallery.clientWidth;
    const columnWidth = (galleryWidth - gap * (columnCount - 1)) / columnCount;
    const columnHeights = new Array(columnCount).fill(0);

    images.forEach((img) => {
        img.style.width = columnWidth + "px";

        const shortestColumn = columnHeights.indexOf(Math.min(...columnHeights));
        const x = shortestColumn * (columnWidth + gap);
        const y = columnHeights[shortestColumn];

        img.style.left = x + "px";
        img.style.top = y + "px";

        const ratio = img.naturalHeight / img.naturalWidth;
        const displayedHeight = columnWidth * ratio;

        columnHeights[shortestColumn] += displayedHeight + gap;
    });

    gallery.style.height = Math.max(...columnHeights) + "px";
}

images.forEach((img, index) => {
    img.addEventListener("load", layoutMasonry);

    img.addEventListener("click", () => {
        currentIndex = index;
        lightboxImg.src = img.src;
        lightbox.classList.add("active");
    });
});

window.addEventListener("load", layoutMasonry);
window.addEventListener("resize", layoutMasonry);

function closeLightbox() {
    lightbox.classList.remove("active");
}

function nextImage() {
    currentIndex = (currentIndex + 1) % images.length;
    lightboxImg.src = images[currentIndex].src;
}

function prevImage() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    lightboxImg.src = images[currentIndex].src;
}

document.addEventListener("keydown", function(e) {
    if (!lightbox.classList.contains("active")) return;

    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowRight") nextImage();
    if (e.key === "ArrowLeft") prevImage();
});

lightbox.addEventListener("click", function(e) {
    if (e.target === lightbox) {
        closeLightbox();
    }
});
</script>
