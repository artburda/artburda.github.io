<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>artburda Fotografie</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #111;
    color: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

header {
    padding: 80px 24px 60px;
    text-align: center;
}

h1 {
    margin: 0;
    font-size: 2.8rem;
    font-weight: 300;
    letter-spacing: 0.08em;
}

header p {
    color: #888;
    margin-top: 16px;
    font-size: 0.95rem;
    letter-spacing: 0.03em;
}

.gallery {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
}

.gallery img {
    max-width: 100%;
    max-height: 85vh;
    width: auto;
    height: auto;
    display: block;
}

footer {
    text-align: center;
    padding: 48px 24px;
    color: #666;
    font-size: 0.9rem;
    line-height: 1.8;
}

@media (max-width: 700px) {

    header {
        padding: 60px 16px 40px;
    }

    h1 {
        font-size: 2rem;
    }

    .gallery {
        padding: 0 16px 32px;
        gap: 20px;
    }

    .gallery img {
        max-height: none;
    }
}
</style>

</head>
<body>

<header>
    <h1>artburda</h1>
    <p>Fotografie</p>
</header>

<main class="gallery">
    <img src="images/1.jpg" alt="">
    <img src="images/2.jpg" alt="">
    <img src="images/3.jpg" alt="">
    <img src="images/4.jpg" alt="">
    <img src="images/5.jpg" alt="">
    <img src="images/6.jpg" alt="">
</main>

<footer>
    artburda@hotmail.com<br>
    © 2026 Arthur Burda
</footer>

</body>
</html>
