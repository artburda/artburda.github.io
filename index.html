<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #111;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      padding: 48px 24px 32px;
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    p {
      color: #aaa;
      margin-top: 10px;
      font-size: 1rem;
    }

    .gallery {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 48px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 12px;
    }

    .gallery img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 2px;
    }

    footer {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      color: #666;
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      header {
        padding: 32px 16px 24px;
      }

      .gallery {
        padding: 0 16px 32px;
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>artburda</h1>
    <p>Fotografie - Kontakt: artburda@hotmail.com/p>
  </header>

  <main class="gallery">
    <img src="images/1.jpg" alt="Photo 1">
    <img src="images/2.jpg" alt="Photo 2">
    <img src="images/3.jpg" alt="Photo 3">
    <img src="images/4.jpg" alt="Photo 4">
    <img src="images/5.jpg" alt="Photo 5">
    <img src="images/6.jpg" alt="Photo 6">
  </main>

  <footer>
    © 2026 Arthur Burda
  </footer>

</body>
</html>
